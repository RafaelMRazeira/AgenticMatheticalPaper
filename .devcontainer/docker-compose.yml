# ============================================================================
# Docker Compose for Claude Code + ai-jail research devcontainer
# ============================================================================
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      # Project workspace
      - ..:/workspaces/research:cached
      # Named volume for Claude config persistence across rebuilds
      - claude-config:/home/vscode/.claude
    # Keep container alive for devcontainer attach
    command: sleep infinity
    # Run as non-root
    user: "1000:1000"
    # Required for bubblewrap (ai-jail's Linux backend).
    # bwrap needs to create namespaces, mount /proc, and manipulate mount
    # propagation — Docker's default /proc masking and AppArmor block all of
    # these even with SYS_ADMIN. Since ai-jail/bwrap is the actual sandbox
    # layer, we grant the container full privileges and let bwrap restrict
    # the child process.
    privileged: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - CLAUDE_CONFIG_DIR=/home/vscode/.claude
      # Route Ollama calls to the host machine.
      # Inside the container, localhost == the container itself;
      # host.docker.internal resolves to the host via extra_hosts above.
      - OLLAMA_HOST=0.0.0.0:11434

volumes:
  claude-config:
